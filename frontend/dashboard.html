<!DOCTYPE html>
<html>
<head>
    <title>📊 LLM-NAS Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; margin: 0; }
        .nav { margin-top: 15px; }
        .nav a { margin-right: 15px; color: #2563eb; text-decoration: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .metric { font-size: 24px; font-weight: bold; color: #2563eb; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; font-weight: bold; }
        .good { color: green; }
        .medium { color: orange; }
        .low { color: red; }
        .controls { margin: 20px 0; }
        .btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 LLM-NAS Performance Dashboard</h1>
            <div class="nav">
                <a href="http://localhost:8080">🎮 Generator</a>
                <a href="http://localhost:8082">🏠 Home</a>
                <a href="http://localhost:5001">⚙️ API</a>
                <a href="#" style="font-weight: bold;">📊 Dashboard</a>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="loadData()">🔄 Refresh</button>
            <button class="btn" onclick="generateTestData()">🧪 Generate Test Data</button>
            <button class="btn" onclick="showComparison()">📈 Compare</button>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Loading...</h3>
                <p>Please wait while loading data</p>
            </div>
        </div>
        
        <h2>Projects History</h2>
        <table id="projectsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Domain</th>
                    <th>MCU</th>
                    <th>Latency</th>
                    <th>Memory</th>
                    <th>Power</th>
                    <th>Accuracy</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="projectsBody">
                <tr><td colspan="8" style="text-align: center;">Loading...</td></tr>
            </tbody>
        </table>
        
        <div style="margin-top: 30px; padding: 20px; background: white; border-radius: 10px;">
            <h3>System Status</h3>
            <p id="status">Checking backend connection...</p>
            <p>Backend URL: <code id="backendUrl">http://localhost:5001</code></p>
        </div>
    </div>
    
    <script>
        const BACKEND_URL = 'http://localhost:5001';
        
        function formatMetric(value, type) {
            if (type === 'latency') {
                if (value < 5) return `<span class="good">${value} ms</span>`;
                if (value < 10) return `<span class="medium">${value} ms</span>`;
                return `<span class="low">${value} ms</span>`;
            }
            if (type === 'memory') {
                if (value < 10) return `<span class="good">${value} KB</span>`;
                if (value < 30) return `<span class="medium">${value} KB</span>`;
                return `<span class="low">${value} KB</span>`;
            }
            if (type === 'power') {
                if (value < 1) return `<span class="good">${value} mW</span>`;
                if (value < 5) return `<span class="medium">${value} mW</span>`;
                return `<span class="low">${value} mW</span>`;
            }
            if (type === 'accuracy') {
                if (value > 0.9) return `<span class="good">${(value*100).toFixed(1)}%</span>`;
                if (value > 0.85) return `<span class="medium">${(value*100).toFixed(1)}%</span>`;
                return `<span class="low">${(value*100).toFixed(1)}%</span>`;
            }
            return value;
        }
        
        async function loadData() {
            try {
                const response = await fetch(BACKEND_URL + '/api/projects');
                const data = await response.json();
                
                document.getElementById('status').innerHTML = 
                    `✅ Backend connected - ${data.statistics.total_projects} projects loaded`;
                
                updateStats(data.projects);
                updateProjectsTable(data.projects);
                
            } catch (error) {
                document.getElementById('status').innerHTML = 
                    `❌ Cannot connect to backend: ${error.message}`;
            }
        }
        
        function updateStats(projects) {
            const statsGrid = document.getElementById('statsGrid');
            
            if (!projects || projects.length === 0) {
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <h3>No Data</h3>
                        <p>Generate some projects first</p>
                    </div>
                `;
                return;
            }
            
            // Calculate statistics
            const totalProjects = projects.length;
            const domains = [...new Set(projects.map(p => p.domain))];
            const avgScore = projects.reduce((sum, p) => sum + (p.metrics.score || p.metrics.optimization_score), 0) / totalProjects;
            
            // Find best project
            const bestProject = projects.reduce((best, p) => {
                const score = p.metrics.score || p.metrics.optimization_score;
                const bestScore = best.metrics.score || best.metrics.optimization_score;
                return score > bestScore ? p : best;
            });
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h3>📈 Overview</h3>
                    <div class="metric">${totalProjects}</div>
                    <p>Total Projects</p>
                    <div class="metric">${domains.length}</div>
                    <p>Different Domains</p>
                </div>
                
                <div class="stat-card">
                    <h3>🏆 Best Project</h3>
                    <p><strong>${bestProject.domain} + ${bestProject.mcu}</strong></p>
                    <div class="metric">${((bestProject.metrics.score || bestProject.metrics.optimization_score) * 100).toFixed(1)}%</div>
                    <p>Optimization Score</p>
                    <p>Latency: ${bestProject.metrics.latency_ms} ms</p>
                </div>
                
                <div class="stat-card">
                    <h3>📊 Averages</h3>
                    <div class="metric">${(avgScore * 100).toFixed(1)}%</div>
                    <p>Average Score</p>
                    <p>Domains: ${domains.join(', ')}</p>
                </div>
            `;
        }
        
        function updateProjectsTable(projects) {
            const tbody = document.getElementById('projectsBody');
            
            if (!projects || projects.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align: center;">
                            No projects yet. Use the generator to create some!
                        </td>
                    </tr>
                `;
                return;
            }
            
            // Sort by time (newest first)
            projects.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            tbody.innerHTML = projects.map(project => `
                <tr>
                    <td><small>${project.id}</small></td>
                    <td><strong>${project.domain}</strong></td>
                    <td>${project.mcu.toUpperCase()}</td>
                    <td>${formatMetric(project.metrics.latency_ms, 'latency')}</td>
                    <td>${formatMetric(project.metrics.memory_kb, 'memory')}</td>
                    <td>${formatMetric(project.metrics.power_mw, 'power')}</td>
                    <td>${formatMetric(project.metrics.accuracy, 'accuracy')}</td>
                    <td>${formatMetric(project.metrics.score || project.metrics.optimization_score, 'score')}</td>
                </tr>
            `).join('');
        }
        
        async function generateTestData() {
            const testConfigs = [
                {domain: "medical", mcu: "riscv", latency: 10, memory: 128, power: 30},
                {domain: "iot", mcu: "esp32", latency: 50, memory: 32, power: 20},
                {domain: "industrial", mcu: "stm32", latency: 20, memory: 64, power: 50}
            ];
            
            for (const config of testConfigs) {
                try {
                    await fetch(BACKEND_URL + '/api/generate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(config)
                    });
                } catch (error) {
                    console.error('Error:', error);
                }
            }
            
            // Reload data after generation
            setTimeout(loadData, 2000);
        }
        
        async function showComparison() {
            try {
                const response = await fetch(BACKEND_URL + '/api/compare');
                const data = await response.json();
                
                alert(`Comparison loaded with ${data.comparisons.length} configurations\n\nKey insights:\n${data.conclusions.join('\n')}`);
                
            } catch (error) {
                alert('Error loading comparison: ' + error.message);
            }
        }
        
        // Load data on page load
        window.onload = loadData;
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
