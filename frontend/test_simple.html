<!DOCTYPE html>
<html>
<head><title>LLM-NAS Test</title></head>
<body>
    <h1>🚀 LLM-NAS TEST SIMPLE</h1>
    <button onclick="test()">Tester API</button>
    <button onclick="generate()">Générer projet</button>
    <div id="result"></div>
    <script>
        async function test() {
            const res = await fetch('http://localhost:60000/api/health');
            const data = await res.json();
            document.getElementById('result').innerHTML = 
                '✅ ' + JSON.stringify(data, null, 2);
        }
        
        async function generate() {
            const res = await fetch('http://localhost:60000/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({domain: 'test', mcu: 'riscv'})
            });
            const data = await res.json();
            document.getElementById('result').innerHTML = 
                '🎉 Projet généré: ' + data.project_id;
        }
        
        // Test automatique au chargement
        window.onload = test;
    </script>
</body>
</html>
